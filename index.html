<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Overture | We do cool shit.</title>
  <link rel="icon" type="image/png" href="images/favicon.png"/>
  <link rel="shortcut icon" href="images/favicon.ico"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/overture.css"/>
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #page { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    #streams-body { display: flex; flex: 1; min-height: 0; }

    /* Player */
    #player-col { background: #000; display: flex; flex-direction: column; flex: 1; min-width: 0; }
    #player-area { flex: 1; position: relative; min-height: 0; }
    #player-area iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }


    /* Sidebar */
    #sidebar { width: 260px; flex-shrink: 0; background: var(--surf); border-left: 1px solid var(--brd); display: flex; flex-direction: column; overflow: hidden; }

    /* Sidebar controls */
    #sb-controls { padding: 8px 10px; border-bottom: 1px solid var(--brd); display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    #sb-search { flex: 1; background: var(--card); border: 1px solid var(--brd); color: var(--txt); font-family: 'Barlow', sans-serif; font-size: 12px; padding: 5px 9px; border-radius: 4px; outline: none; min-width: 0; }
    #sb-search:focus { border-color: var(--p); }
    #sb-search::placeholder { color: var(--mut); }
    #sort-btn { flex-shrink: 0; background: var(--card); border: 1px solid var(--brd); color: var(--mut); border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 13px; line-height: 1; transition: border-color .15s, color .15s; display: flex; align-items: center; gap: 4px; }
    #sort-btn:hover { border-color: var(--p); color: var(--txt); }
    #sort-btn.active { border-color: var(--p); color: var(--p); }
    #sort-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: .5px; }


    #ch-list { overflow-y: auto; flex: 1; }
    #ch-list::-webkit-scrollbar { width: 3px; }
    #ch-list::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 2px; }
    .ch { padding: 10px 14px; display: flex; align-items: center; cursor: pointer; border-bottom: .5px solid var(--brd); transition: background .12s; }
    .ch:hover { background: var(--card); }
    .ch.active { background: rgba(145,70,255,.14); border-left: 2px solid var(--p); }
    .ci { flex: 1; min-width: 0; }
    .cn { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cs a { font-size: 11px; color: var(--p); text-decoration: none; }
    .cs a:hover { text-decoration: underline; }
    #no-results { padding: 20px 14px; text-align: center; color: var(--mut); font-size: 12px; display: none; }
    #sb-footer { padding: 8px 14px; border-top: 1px solid var(--brd); font-size: 11px; color: var(--mut); text-align: center; flex-shrink: 0; }

    @media (max-width: 767px) {
      body { overflow: auto; height: auto; }
      #streams-body { flex-direction: column; }
      #sidebar { width: 100%; border-left: none; border-top: 1px solid var(--brd); max-height: 360px; }
      #player-area { min-height: 240px; }
    }
  </style>
</head>
<body>
  <div id="ov-navbar"></div>
  <div id="page">
    <div id="streams-body">
      <div id="player-col">
        <div id="player-area"></div>
      </div>
      <div id="sidebar">
        <div id="sb-controls">
          <input id="sb-search" type="text" placeholder="Search creators..." autocomplete="off"/>
          <button id="sort-btn" title="Sort alphabetically">
            <svg id="sort-icon" viewBox="0 0 16 16" width="13" height="13" fill="currentColor">
              <path d="M2 4h12v1.5H2zm2 3h8v1.5H4zm2 3h4v1.5H6z"/>
            </svg>
            <span id="sort-label">A–Z</span>
          </button>
        </div>
        <div id="ch-list"></div>
        <div id="no-results">No channels match your search</div>
      </div>
    </div>
  </div>
  <div id="ov-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/layout.js"></script>
  <script>
    // ─── GITHUB PAGES DOMAIN ─────────────────────────────────
    const PARENT_DOMAIN = "teamoverture.github.io";

    // ─── DEFAULT CHANNEL (loaded on page open) ────────────────────
    const DEFAULT_CHANNEL = { login: "teamoverture", display: "teamoverture" };

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    let allChannels = [];
    let sortMode = null;
    let displayOrder = [];
    let filterText = '';
    let active = null;
    let playerFrame = null;

    const searchEl   = document.getElementById('sb-search');
    const sortBtn    = document.getElementById('sort-btn');
    const sortLabel  = document.getElementById('sort-label');
    const chList     = document.getElementById('ch-list');
    const noResults  = document.getElementById('no-results');
    const playerArea = document.getElementById('player-area');

    function getVisible() {
      const q = filterText.toLowerCase();
      return displayOrder.filter(ch =>
        ch.display.toLowerCase().includes(q) || ch.login.includes(q)
      );
    }

    function render() {
      const visible = getVisible();
      chList.innerHTML = '';
      noResults.style.display = visible.length === 0 ? 'block' : 'none';
      visible.forEach(ch => {
        const el = document.createElement('div');
        el.className = 'ch' + (ch.login === active ? ' active' : '');
        el.innerHTML = `<div class="ci"><div class="cn">${ch.display}</div><div class="cs"><a href="https://www.twitch.tv/${ch.login}" target="_blank">twitch.tv/${ch.login}</a></div></div>`;
        el.addEventListener('click', e => { if (e.target.tagName === 'A') return; tuneIn(ch.login, ch.display); });
        chList.appendChild(el);
      });
    }

    function tuneIn(login, display) {
      active = login;
      if (playerFrame) playerFrame.remove();
      playerFrame = document.createElement('iframe');
      playerFrame.src = `https://player.twitch.tv/?channel=${login}&parent=${PARENT_DOMAIN}&autoplay=true&muted=false`;
      playerFrame.width = 1280;
      playerFrame.height = 720;
      playerArea.appendChild(playerFrame);
      render();
    }

    function cycleSort() {
      if (sortMode === null || sortMode === 'desc') {
        sortMode = 'asc';
        displayOrder = [...allChannels].sort((a, b) => a.display.localeCompare(b.display));
        sortLabel.textContent = 'A–Z';
        sortBtn.classList.add('active');
      } else {
        sortMode = 'desc';
        displayOrder = [...allChannels].sort((a, b) => b.display.localeCompare(a.display));
        sortLabel.textContent = 'Z–A';
      }
      render();
    }

    sortBtn.addEventListener('click', cycleSort);
    searchEl.addEventListener('input', () => { filterText = searchEl.value; render(); });

    // Load roster from creators.json then boot
    fetch('creators.json')
      .then(r => r.json())
      .then(data => {
        allChannels = data.map(item =>
          typeof item === 'string'
            ? { login: item.trim().toLowerCase(), display: item.trim() }
            : { login: String(item.login).trim().toLowerCase(), display: String(item.display || item.login).trim() }
        );
        displayOrder = shuffle(allChannels);
        render();
        tuneIn(DEFAULT_CHANNEL.login, DEFAULT_CHANNEL.display);
      })
      .catch(err => {
        console.error('Failed to load creators.json:', err);
        chList.innerHTML = '<div style="padding:20px 14px;text-align:center;color:var(--mut);font-size:12px;">Could not load creator list.</div>';
      });
  </script>
</body>
</html>
