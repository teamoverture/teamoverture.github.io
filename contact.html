<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Overture</title>
  <link rel="icon" type="image/png" href="images/favicon.png"/>
  <link rel="shortcut icon" href="images/favicon.ico"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/overture.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .social-card {
      background: var(--card);
      border: 1px solid var(--brd);
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      color: var(--txt);
      transition: border-color .15s, background .15s;
    }
    .social-card:hover { border-color: var(--p); background: #27272b; color: var(--txt); }
    .social-icon {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: var(--surf);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid var(--brd);
    }
    .social-icon svg { width: 20px; height: 20px; }
    .social-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .3px;
    }
    .social-handle { font-size: .8rem; color: var(--mut); }
    .social-arrow { margin-left: auto; color: var(--mut); font-size: 1rem; }
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--mut);
      margin-bottom: 1rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--brd);
    }
  </style>
</head>
<body>
  <div id="ov-navbar"></div>

  <div class="ov-hero">
    <div class="container-fluid px-4">
      <h1>Contact <span class="accent">&amp; Socials</span></h1>
      <p>Find us around the web.</p>
    </div>
  </div>

  <main class="container-fluid px-4 py-4 flex-grow-1">
    <div class="row">
      <div class="col-lg-6">

        <p class="section-label">Find us on</p>

        <div class="d-flex flex-column gap-3 mb-4">

          <!-- Twitch -->
          <a class="social-card" href="https://twitch.tv/team/overture" target="_blank" rel="noopener">
            <div class="social-icon">
              <svg viewBox="0 0 24 24" fill="#9146FF"><path d="M11.64 5.93h1.43v4.28h-1.43m3.93-4.28H17v4.28h-1.43M7 2L3.43 5.57v12.86h4.28V22l3.58-3.57h2.85L20.57 12V2m-1.43 9.29l-2.85 2.85h-2.86l-2.5 2.5v-2.5H7.71V3.43h11.43z"/></svg>
            </div>
            <div>
              <div class="social-label">Twitch</div>
              <div class="social-handle">twitch.tv/team/overture</div>
            </div>
          </a>

          <!-- Twitter / X -->
          <a class="social-card" href="https://x.com/teamoverture" target="_blank" rel="noopener">
            <div class="social-icon">
              <svg viewBox="0 0 24 24" fill="var(--txt)"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.912-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </div>
            <div>
              <div class="social-label">X / Twitter</div>
              <div class="social-handle">@teamoverture</div>
            </div>
          </a>

          <!-- Discord -->
          <a class="social-card" href="https://discord.gg/mnuBB3BCP5" target="_blank" rel="noopener">
            <div class="social-icon">
              <svg viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
            </div>
            <div>
              <div class="social-label">Discord</div>
              <div class="social-handle">discord.gg/mnuBB3BCP5</div>
            </div>
          </a>

          <!-- Instagram -->

              </svg>
            </div>
            <div>
              <div class="social-label">Instagram</div>
              <div class="social-handle">@teamoverture</div>
            </div>
          </a>

          <!-- Bluesky -->
          <a class="social-card" href="https://bsky.app/profile/teamoverture.bsky.social" target="_blank" rel="noopener">
            <div class="social-icon">

            </div>
            <div>
              <div class="social-label">Bluesky</div>
              <div class="social-handle">@teamoverture.bsky.social</div>
            </div>
          </a>

        </div>
        <!-- ─────────────────────────────────────────────────────── -->

        <!-- Contact email -->
        <p class="section-label">Get in touch</p>
        <div class="ov-card">
          <p style="color:var(--mut); font-size:.875rem; margin-bottom:.5rem;">For business enquiries or partnership requests:</p>
          <a href="mailto:overturecreators@gmail.com" style="font-size:1rem;">overturecreators@gmail.com</a>
        </div>

      </div>
    </div>
  </main>

  <div id="ov-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/layout.js"></script>
</body>
</html>
